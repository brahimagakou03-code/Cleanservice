# Express via fonction serverless — pas de site statique seul.
# Supabase plus tard : définir quand même DATABASE_URL (PostgreSQL) dans Netlify → Environment variables.

[build]
  command = "npm run build"
  publish = "netlify/publish"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # Évite les faux positifs : scripts SQL, exemples d’env, règles Cursor (souvent «3000 », « localhost »).
  SECRETS_SCAN_OMIT_PATHS = ".env.example,scripts/sql/**,.cursor/**"
  # Ces clés sont surtout de la config d’exécution ; les JWT / clés API restent scannés.
  SECRETS_SCAN_OMIT_KEYS = "PORT,SMTP_HOST,SMTP_PORT,MAIL_FROM,APP_BASE_URL"

# Cookies CSRF en HTTPS (obligatoire sur Netlify)
[context.production.environment]
  CSRF_COOKIE_SECURE = "true"

[context.deploy-preview.environment]
  CSRF_COOKIE_SECURE = "true"

[functions]
  # nft suit mieux les require dynamiques ; ejs doit rester dans node_modules (Express le charge sans import statique).
  node_bundler = "nft"
  external_node_modules = ["ejs"]
  # Fichiers servis par Express (static + vues EJS) + schéma Prisma
  included_files = ["public/**", "src/**", "prisma/schema.prisma"]

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
